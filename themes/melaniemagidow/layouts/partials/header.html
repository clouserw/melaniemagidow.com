<header class="site-header content-container">
    <div class="header-wrapper">
        <div class="site-logo">
            <a href="{{ "/" | relURL }}">
                <img src="{{ "/images/marhaba-symbol.png" | relURL }}" alt="{{ site.Title }}" width="100" height="119">
            </a>
        </div>

            <nav class="site-nav">
                <ul>
                    {{ range site.Menus.main }}
                    <li><a href="{{ .URL }}">{{ .Name }}</a></li>
                    {{ end }}
                </ul>
            </nav>
        </div>

    <div class="search-container">
        <button class="search-toggle" aria-label="Toggle search" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        </button>
        <form class="search-form" role="search">
            <input type="search" id="search-input" class="search-input" placeholder="Search posts..." autocomplete="off" aria-label="Search posts">
            <div class="search-results" id="search-results" role="listbox" aria-label="Search results"></div>
        </form>
    </div>
</header>
